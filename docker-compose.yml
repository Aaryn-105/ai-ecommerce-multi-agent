# ==============================================================
# docker-compose.yml — AI E-Commerce Multi-Agent System
# ==============================================================
version: "3.9"

services:
  # ── Backend: FastAPI Multi-Agent Service ────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-ecommerce-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data/app.db
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - APP_RELOAD=false
    volumes:
      - db_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Frontend: React + Vite + Nginx ─────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-ecommerce-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  db_data: